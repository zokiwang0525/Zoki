<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="760" viewBox="0 0 1060 760" font-family="'PingFang TC','Microsoft JhengHei','Noto Sans CJK TC',sans-serif">
  <rect width="1060" height="760" fill="#f7f9fc"/>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4a5568"/>
    </marker>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c53030"/>
    </marker>
  </defs>

  <text x="530" y="44" text-anchor="middle" font-size="28" font-weight="bold" fill="#1a202c">封包傳輸與「封包遺失」的處理</text>
  <text x="530" y="71" text-anchor="middle" font-size="14.5" fill="#718096">封包(Packet）＝ 網路上傳資料的小單位;每秒約 50 次把角色狀態切成封包傳給對手</text>

  <!-- ===== Scenario 1: normal ===== -->
  <text x="40" y="120" font-size="17" font-weight="bold" fill="#2f855a">① 正常傳輸</text>
  <circle cx="95" cy="160" r="26" fill="#ebf8ff" stroke="#3182ce" stroke-width="2.5"/>
  <text x="95" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6cb0">A</text>
  <circle cx="965" cy="160" r="26" fill="#f0fff4" stroke="#38a169" stroke-width="2.5"/>
  <text x="965" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#2f855a">B</text>
  <line x1="125" y1="160" x2="935" y2="160" stroke="#cbd5e0" stroke-width="2"/>
  <g font-size="14" font-weight="bold" text-anchor="middle">
    <rect x="250" y="146" width="28" height="28" rx="5" fill="#bee3f8" stroke="#3182ce"/><text x="264" y="165" fill="#2c5282">1</text>
    <rect x="370" y="146" width="28" height="28" rx="5" fill="#bee3f8" stroke="#3182ce"/><text x="384" y="165" fill="#2c5282">2</text>
    <rect x="490" y="146" width="28" height="28" rx="5" fill="#bee3f8" stroke="#3182ce"/><text x="504" y="165" fill="#2c5282">3</text>
    <rect x="610" y="146" width="28" height="28" rx="5" fill="#bee3f8" stroke="#3182ce"/><text x="624" y="165" fill="#2c5282">4</text>
  </g>
  <text x="800" y="140" text-anchor="middle" font-size="13.5" fill="#2f855a">依序、完整送達 ✅</text>

  <!-- ===== Scenario 2: loss + retransmit ===== -->
  <text x="40" y="262" font-size="17" font-weight="bold" fill="#c53030">② 封包遺失</text>
  <circle cx="95" cy="320" r="26" fill="#ebf8ff" stroke="#3182ce" stroke-width="2.5"/>
  <text x="95" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6cb0">A</text>
  <circle cx="965" cy="320" r="26" fill="#f0fff4" stroke="#38a169" stroke-width="2.5"/>
  <text x="965" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#2f855a">B</text>
  <line x1="125" y1="320" x2="935" y2="320" stroke="#cbd5e0" stroke-width="2"/>
  <g font-size="14" font-weight="bold" text-anchor="middle">
    <rect x="250" y="306" width="28" height="28" rx="5" fill="#bee3f8" stroke="#3182ce"/><text x="264" y="325" fill="#2c5282">1</text>
    <rect x="370" y="306" width="28" height="28" rx="5" fill="#bee3f8" stroke="#3182ce"/><text x="384" y="325" fill="#2c5282">2</text>
    <!-- lost packet 3 -->
    <rect x="490" y="306" width="28" height="28" rx="5" fill="#fed7d7" stroke="#c53030"/><text x="504" y="325" fill="#c53030">3</text>
    <line x1="486" y1="302" x2="522" y2="338" stroke="#c53030" stroke-width="2.5"/>
    <line x1="522" y1="302" x2="486" y2="338" stroke="#c53030" stroke-width="2.5"/>
  </g>
  <text x="504" y="298" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#c53030">遺失 ✗</text>
  <!-- retransmit arrow -->
  <path d="M 264 350 Q 390 405 516 350" fill="none" stroke="#c53030" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arR)"/>
  <text x="390" y="400" text-anchor="middle" font-size="12.5" fill="#c53030">TCP 偵測 → 自動重送 3(慢一拍）</text>
  <text x="800" y="300" text-anchor="middle" font-size="13.5" fill="#c53030">畫面短暫卡頓 / 對手瞬移</text>

  <!-- ===== Scenario 3: game recovers ===== -->
  <text x="40" y="470" font-size="17" font-weight="bold" fill="#6b46c1">③ 遊戲如何因應</text>
  <circle cx="95" cy="525" r="26" fill="#ebf8ff" stroke="#3182ce" stroke-width="2.5"/>
  <text x="95" y="530" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6cb0">A</text>
  <circle cx="965" cy="525" r="26" fill="#f0fff4" stroke="#38a169" stroke-width="2.5"/>
  <text x="965" y="530" text-anchor="middle" font-size="13" font-weight="bold" fill="#2f855a">B</text>
  <line x1="125" y1="525" x2="935" y2="525" stroke="#cbd5e0" stroke-width="2"/>
  <g font-size="13" font-weight="bold" text-anchor="middle">
    <rect x="220" y="512" width="26" height="26" rx="5" fill="#e9d8fd" stroke="#805ad5"/><text x="233" y="530" fill="#553c9a">1</text>
    <rect x="310" y="512" width="26" height="26" rx="5" fill="#e9d8fd" stroke="#805ad5"/><text x="323" y="530" fill="#553c9a">2</text>
    <rect x="400" y="512" width="26" height="26" rx="5" fill="#e9d8fd" stroke="#805ad5"/><text x="413" y="530" fill="#553c9a">3</text>
    <rect x="490" y="512" width="26" height="26" rx="5" fill="#e9d8fd" stroke="#805ad5"/><text x="503" y="530" fill="#553c9a">4</text>
    <rect x="580" y="512" width="26" height="26" rx="5" fill="#e9d8fd" stroke="#805ad5"/><text x="593" y="530" fill="#553c9a">5</text>
    <rect x="670" y="512" width="26" height="26" rx="5" fill="#e9d8fd" stroke="#805ad5"/><text x="683" y="530" fill="#553c9a">6</text>
  </g>
  <text x="800" y="505" text-anchor="middle" font-size="13" fill="#6b46c1">每秒約 50 次連續同步</text>
  <text x="455" y="568" text-anchor="middle" font-size="12.5" fill="#6b46c1">就算某個慢/卡,下一個封包一到 → 畫面立刻跳到最新位置(自動校正）→ 只卡一下,不會永久錯亂</text>

  <!-- summary -->
  <rect x="90" y="606" width="880" height="110" rx="12" fill="#edf2f7" stroke="#4a5568" stroke-width="2"/>
  <text x="530" y="634" text-anchor="middle" font-size="16" font-weight="bold" fill="#2d3748">重點</text>
  <text x="530" y="660" text-anchor="middle" font-size="14" fill="#2d3748">Socket.io 走 WebSocket(TCP）→ <tspan font-weight="bold">保證送達 + 順序正確</tspan>;封包遺失會自動重送。</text>
  <text x="530" y="684" text-anchor="middle" font-size="14" fill="#2d3748">所以影響是「<tspan font-weight="bold" fill="#c53030">延遲 / 卡頓</tspan>」而非「資料消失」,且連續同步會自動把畫面拉回最新。</text>
  <text x="530" y="706" text-anchor="middle" font-size="12" fill="#a0aec0" font-style="italic">取捨:TCP 換可靠但丟包時會卡;職業動作遊戲改用 UDP(允許丟包不卡住)＋ rollback 自行處理</text>
</svg>
