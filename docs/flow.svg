<svg xmlns="http://www.w3.org/2000/svg" width="940" height="1180" viewBox="0 0 940 1180" font-family="'PingFang TC','Microsoft JhengHei','Noto Sans CJK TC',sans-serif">
  <rect width="940" height="1180" fill="#f7f9fc"/>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a5568"/>
    </marker>
  </defs>

  <text x="470" y="46" text-anchor="middle" font-size="30" font-weight="bold" fill="#1a202c">資傳武道 ICKombat ─ 遊戲流程圖</text>
  <text x="470" y="74" text-anchor="middle" font-size="15" fill="#718096">以 Phaser 多場景(Scene)切換,像狀態機一樣運作</text>

  <!-- helper: spine boxes -->
  <!-- 1 開啟網頁 -->
  <rect x="310" y="100" width="320" height="52" rx="10" fill="#edf2f7" stroke="#4a5568" stroke-width="2"/>
  <text x="470" y="132" text-anchor="middle" font-size="16" fill="#2d3748">開啟網頁(瀏覽器連到網址）</text>
  <line x1="470" y1="152" x2="470" y2="178" stroke="#4a5568" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- 2 Boot -->
  <rect x="310" y="180" width="320" height="52" rx="10" fill="#ebe9fb" stroke="#6b46c1" stroke-width="2"/>
  <text x="470" y="205" text-anchor="middle" font-size="16" font-weight="bold" fill="#6b46c1">Boot 封面</text>
  <text x="470" y="223" text-anchor="middle" font-size="12" fill="#805ad5">顯示封面,點擊開始</text>
  <line x1="470" y1="232" x2="470" y2="258" stroke="#4a5568" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- 3 Loading -->
  <rect x="310" y="260" width="320" height="52" rx="10" fill="#ebe9fb" stroke="#6b46c1" stroke-width="2"/>
  <text x="470" y="285" text-anchor="middle" font-size="16" font-weight="bold" fill="#6b46c1">Loading 預載資源</text>
  <text x="470" y="303" text-anchor="middle" font-size="12" fill="#805ad5">一次載入圖片 / 音效 / 角色動畫圖</text>
  <line x1="470" y1="312" x2="470" y2="338" stroke="#4a5568" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- 4 Menu -->
  <rect x="310" y="340" width="320" height="52" rx="10" fill="#ebe9fb" stroke="#6b46c1" stroke-width="2.5"/>
  <text x="470" y="372" text-anchor="middle" font-size="17" font-weight="bold" fill="#6b46c1">Menu 主選單</text>

  <!-- branch lines from Menu to 3 boxes -->
  <line x1="470" y1="392" x2="470" y2="412" stroke="#4a5568" stroke-width="2"/>
  <line x1="160" y1="412" x2="780" y2="412" stroke="#4a5568" stroke-width="2"/>
  <line x1="160" y1="412" x2="160" y2="438" stroke="#4a5568" stroke-width="2" marker-end="url(#a)"/>
  <line x1="470" y1="412" x2="470" y2="438" stroke="#4a5568" stroke-width="2" marker-end="url(#a)"/>
  <line x1="780" y1="412" x2="780" y2="438" stroke="#4a5568" stroke-width="2" marker-end="url(#a)"/>

  <!-- branch boxes (matchmaking) -->
  <rect x="40" y="440" width="240" height="64" rx="10" fill="#fff5eb" stroke="#dd6b20" stroke-width="2"/>
  <text x="160" y="467" text-anchor="middle" font-size="15" font-weight="bold" fill="#c05621">開始遊戲</text>
  <text x="160" y="487" text-anchor="middle" font-size="12" fill="#9c4221">快速配對(隨機湊對）</text>

  <rect x="350" y="440" width="240" height="64" rx="10" fill="#fff5eb" stroke="#dd6b20" stroke-width="2"/>
  <text x="470" y="467" text-anchor="middle" font-size="15" font-weight="bold" fill="#c05621">房間對戰</text>
  <text x="470" y="487" text-anchor="middle" font-size="12" fill="#9c4221">輸入代碼(指定朋友）</text>

  <rect x="660" y="440" width="240" height="64" rx="10" fill="#e6fffa" stroke="#319795" stroke-width="2"/>
  <text x="780" y="467" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c7a7b">練習模式</text>
  <text x="780" y="487" text-anchor="middle" font-size="12" fill="#285e61">單機(跳過配對與選地圖）</text>

  <!-- matchmaking converge to 配對成功 -->
  <line x1="160" y1="504" x2="160" y2="540" stroke="#4a5568" stroke-width="2"/>
  <line x1="470" y1="504" x2="470" y2="540" stroke="#4a5568" stroke-width="2"/>
  <line x1="160" y1="540" x2="470" y2="540" stroke="#4a5568" stroke-width="2"/>
  <line x1="315" y1="540" x2="315" y2="566" stroke="#4a5568" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- 配對成功 -->
  <rect x="155" y="568" width="320" height="50" rx="10" fill="#fffaf0" stroke="#dd6b20" stroke-width="2"/>
  <text x="315" y="599" text-anchor="middle" font-size="15" font-weight="bold" fill="#c05621">配對成功 → 兩位玩家進入同一房間</text>
  <line x1="315" y1="618" x2="315" y2="648" stroke="#4a5568" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- Select -->
  <rect x="155" y="650" width="320" height="56" rx="10" fill="#ebf8ff" stroke="#3182ce" stroke-width="2"/>
  <text x="315" y="675" text-anchor="middle" font-size="16" font-weight="bold" fill="#2b6cb0">Select 選角色</text>
  <text x="315" y="694" text-anchor="middle" font-size="12" fill="#3182ce">雙方選擇即時同步給對方</text>
  <line x1="315" y1="706" x2="315" y2="732" stroke="#4a5568" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- StageSelect -->
  <rect x="155" y="734" width="320" height="56" rx="10" fill="#ebf8ff" stroke="#3182ce" stroke-width="2"/>
  <text x="315" y="759" text-anchor="middle" font-size="16" font-weight="bold" fill="#2b6cb0">StageSelect 選地圖</text>
  <text x="315" y="778" text-anchor="middle" font-size="12" fill="#3182ce">雙方確定後開戰(以房主選擇為準）</text>
  <line x1="315" y1="790" x2="315" y2="816" stroke="#4a5568" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- Fight -->
  <rect x="155" y="818" width="320" height="64" rx="10" fill="#fff5f5" stroke="#e53e3e" stroke-width="2.5"/>
  <text x="315" y="846" text-anchor="middle" font-size="17" font-weight="bold" fill="#c53030">Fight 對戰</text>
  <text x="315" y="867" text-anchor="middle" font-size="12" fill="#e53e3e">即時連線同步 · 三戰兩勝 · HP/SP/GUARD</text>
  <line x1="315" y1="882" x2="315" y2="908" stroke="#4a5568" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- Result -->
  <rect x="155" y="910" width="320" height="56" rx="10" fill="#f0fff4" stroke="#38a169" stroke-width="2"/>
  <text x="315" y="935" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f855a">Result 結算</text>
  <text x="315" y="954" text-anchor="middle" font-size="12" fill="#38a169">勝負畫面 + 戰鬥數據總結</text>

  <!-- practice mode bypass: 練習模式 -> Fight (right side) -->
  <path d="M 780 504 L 780 850 L 480 850" fill="none" stroke="#319795" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#a)"/>
  <text x="790" y="690" font-size="12" fill="#2c7a7b" transform="rotate(90 790 690)">練習模式直接進對戰</text>

  <!-- Result loop back to Select (再玩一次) -->
  <path d="M 155 938 L 95 938 L 95 678 L 150 678" fill="none" stroke="#38a169" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#a)"/>
  <text x="80" y="810" font-size="12" fill="#2f855a" transform="rotate(-90 80 810)">再玩一次 → 回選角</text>

  <!-- side note: Menu extra -->
  <rect x="640" y="340" width="260" height="52" rx="10" fill="#f7fafc" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="770" y="365" text-anchor="middle" font-size="13" fill="#718096">另有:操作指引、數值設定</text>
  <text x="770" y="383" text-anchor="middle" font-size="11" fill="#a0aec0">(從主選單進入的輔助頁面）</text>
  <line x1="630" y1="366" x2="636" y2="366" stroke="#a0aec0" stroke-width="1.5"/>
</svg>
